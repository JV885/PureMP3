name: Build & Release — JV PureMP3

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
# ══════════════════════════════════════════════════════════════════════════════
#  JOB 1 — WINDOWS EXE
# ══════════════════════════════════════════════════════════════════════════════
  build-windows:
    name: 🪟 Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller customtkinter yt-dlp mutagen musicbrainzngs requests pygame pillow
          
      - name: ⬇️ Download FFmpeg
        shell: pwsh
        run: |
          echo "Downloading FFmpeg Essentials build..."
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp"
          $ffmpeg_dir = Get-ChildItem -Path "ffmpeg_temp" -Directory | Select-Object -First 1
          Copy-Item "$($ffmpeg_dir.FullName)\bin\ffmpeg.exe" -Destination "."
          Copy-Item "$($ffmpeg_dir.FullName)\bin\ffprobe.exe" -Destination "."
          Remove-Item "ffmpeg.zip"
          Remove-Item -Recurse "ffmpeg_temp"

      - name: 🏷️ Stamp version into source
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          (Get-Content PureMP3.py) | ForEach-Object {
            $_ -replace 'APP_VERSION_TAG\s*=\s*"v[\d\.]+"', "APP_VERSION_TAG   = `"$tag`""
          } | Set-Content PureMP3.py

      - name: 🔨 Build jv_puremp3.exe with PyInstaller
        run: |
          pyinstaller --noconfirm `
            --onefile `
            --windowed `
            --name "jv_puremp3" `
            --icon "asset/icon.ico" `
            --add-data "asset;asset" `
            --add-data "ffmpeg.exe;." `
            --add-data "ffprobe.exe;." `
            PureMP3.py

      - name: 🔨 Build updater.exe with PyInstaller
        run: |
          pyinstaller --noconfirm `
            --onefile `
            --console `
            --name "updater" `
            updater.py

      - name: 📤 Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: |
            dist/jv_puremp3.exe
            dist/updater.exe
          retention-days: 1

# ══════════════════════════════════════════════════════════════════════════════
#  JOB 2 — GITHUB RELEASE
# ══════════════════════════════════════════════════════════════════════════════
  release:
    name: 🚀 Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows]

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⬇️ Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist/

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "JV PureMP3  ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 📦 JV PureMP3  ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | 🪟 Windows | `jv_puremp3.exe` | Single-file, no install needed |

            > **Auto-update**: If you already have JV PureMP3 installed, it will
            > detect this release on next launch and offer to update automatically.

            ---
          files: |
            dist/jv_puremp3.exe
            dist/updater.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
