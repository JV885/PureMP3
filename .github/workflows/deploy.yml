name: Build & Release — JV PureMP3

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER: Only fire on version tags (e.g.  v1.0.0, v2.3.1)
# This ensures no accidental releases from regular commits.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "v*.*.*"

# Grant the workflow permission to create releases
permissions:
  contents: write

jobs:
# ══════════════════════════════════════════════════════════════════════════════
#  JOB 1 — WINDOWS EXE  (windows-latest runner + PyInstaller)
# ══════════════════════════════════════════════════════════════════════════════
  build-windows:
    name: 🪟 Build Windows EXE
    runs-on: windows-latest

    steps:
      # 1. Checkout source
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install Python dependencies
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller customtkinter yt-dlp mutagen musicbrainzngs requests pygame pillow
          
      # ⬇️ 3.5 Download FFmpeg binaries (So they don't have to be in the repo)
      - name: ⬇️ Download FFmpeg
        shell: pwsh
        run: |
          echo "Downloading FFmpeg Essentials build..."
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp"
          $ffmpeg_dir = Get-ChildItem -Path "ffmpeg_temp" -Directory | Select-Object -First 1
          Copy-Item "$($ffmpeg_dir.FullName)\bin\ffmpeg.exe" -Destination "."
          Copy-Item "$($ffmpeg_dir.FullName)\bin\ffprobe.exe" -Destination "."
          Remove-Item "ffmpeg.zip"
          Remove-Item -Recurse "ffmpeg_temp"
          echo "FFmpeg binaries ready for bundling."

      # 4. Stamp the version tag into the source so the bundled binary
      #    reports the correct version when doing self-checks.
      - name: 🏷️ Stamp version into source
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          (Get-Content jv-puremp3.py) `
            -replace 'APP_VERSION_TAG\s*=\s*"v[\d\.]+"', "APP_VERSION_TAG   = `"$tag`"" |
            Set-Content jv-puremp3.py

      # 5. Build the main application EXE
      - name: 🔨 Build jv_puremp3.exe with PyInstaller
        run: |
          pyinstaller --noconfirm `
            --onefile `
            --windowed `
            --name "jv_puremp3" `
            --icon "asset/icon.ico" `
            --add-data "asset;asset" `
            --add-data "ffmpeg.exe;." `
            --add-data "ffprobe.exe;." `
            jv-puremp3.py

      # 6. Build the detached updater EXE (bundled alongside the main app)
      - name: 🔨 Build updater.exe with PyInstaller
        run: |
          pyinstaller --noconfirm `
            --onefile `
            --console `
            --name "updater" `
            updater.py

      # 7. Upload both EXEs as artifacts for the release job
      - name: 📤 Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: |
            dist/jv_puremp3.exe
            dist/updater.exe
          retention-days: 1

# ══════════════════════════════════════════════════════════════════════════════
#  JOB 2 — ANDROID APK  (ubuntu-latest runner + Flet SDK)
# ══════════════════════════════════════════════════════════════════════════════
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install system dependencies required by Flet / Buildozer
      - name: 🛠️ Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip python3-setuptools \
            build-essential libssl-dev libffi-dev \
            libsqlite3-dev zlib1g-dev

      # 4. Set JAVA_HOME for the Android build toolchain
      - name: ☕ Set JAVA_HOME
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV

      # 5. Install Flet (includes its own Android build SDK)
      - name: 📦 Install Flet
        run: |
          pip install --upgrade pip flet

      # 6. Cache the Flet Android / Flutter SDK to speed up repeat builds
      - name: 💾 Cache Flet Flutter SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.flet
            ~/.pub-cache
          key: flet-android-${{ runner.os }}-${{ hashFiles('mp3_downloader_android.py') }}
          restore-keys: |
            flet-android-${{ runner.os }}-

      # 7. Stamp the version tag into the Android source file
      - name: 🏷️ Stamp version into Android source
        run: |
          TAG="${{ github.ref_name }}"
          sed -i "s/APP_VERSION_TAG\s*=\s*\"v[0-9.]*\"/APP_VERSION_TAG   = \"$TAG\"/" \
            mp3_downloader_android.py || true

      # 8. Build the signed release APK
      #    Package name com.jvlabs.puremp3 is FIXED so Android treats every
      #    successive release as an in-place update rather than a new install.
      - name: 🔨 Build Android APK with Flet
        run: |
          flet build apk \
            --project "JV PureMP3" \
            --org "com.jvlabs" \
            --build-version "${{ github.ref_name }}" \
            mp3_downloader_android.py

      # 9. Locate the generated APK and rename it with the version tag
      - name: 📝 Rename APK with version tag
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p release_apk
          find . -name "*.apk" | head -1 | xargs -I{} cp {} release_apk/jv_puremp3-${TAG}.apk
          echo "APK_PATH=release_apk/jv_puremp3-${TAG}.apk" >> $GITHUB_ENV

      # 10. Upload APK as artifact for the release job
      - name: 📤 Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-dist
          path: release_apk/*.apk
          retention-days: 1

# ══════════════════════════════════════════════════════════════════════════════
#  JOB 3 — GITHUB RELEASE  (publishes both assets + auto-changelog)
# ══════════════════════════════════════════════════════════════════════════════
  release:
    name: 🚀 Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]  # Wait for both builds to finish

    steps:
      # 1. Checkout (needed by softprops for changelog generation)
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history required for changelog diff

      # 2. Download Windows build artifacts
      - name: ⬇️ Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist/

      # 3. Download Android build artifacts
      - name: ⬇️ Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-dist
          path: apk/

      # 4. List downloaded files for debug visibility in the Actions log
      - name: 📋 List release assets
        run: |
          echo "=== Windows ===" && ls -lh dist/ || true
          echo "=== Android  ===" && ls -lh apk/  || true

      # 5. Create the GitHub Release, attach both assets, and auto-generate
      #    a changelog from commits since the last tag.
      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "JV PureMP3  ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true   # Auto-generates changelog from PR/commit history
          body: |
            ## 📦 JV PureMP3  ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | 🪟 Windows | `jv_puremp3.exe` | Single-file, no install needed |
            | 🤖 Android | `jv_puremp3-${{ github.ref_name }}.apk` | Enable "Install unknown apps" |

            > **Auto-update**: If you already have JV PureMP3 installed, it will
            > detect this release on next launch and offer to update automatically.

            ---
          files: |
            dist/jv_puremp3.exe
            dist/updater.exe
            apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
